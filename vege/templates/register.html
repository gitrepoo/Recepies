<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <title>Register | Page</title>
</head>
<body>

    <div  class="container mt-5">   
        <form class="col-7 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data"> 
          {% csrf_token %}
            <h2>Register</h2>
            <hr> 
             {% if messages %}
             {{ messages.tags }}
             <div class="alert alert-danger" role="alert">
                {% for message in messages %} 
                {{ message }} 
                {% endfor %}
             </div> 
            {% endif %}

            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">First name</label>
                <input type="text" class="form-control" name="first_name" id="exampleInputEmail1" aria-describedby="emailHelp">
              </div>

            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Last name</label> 
                <input type="text" class="form-control"  name="last_name" id="exampleInputEmail1" aria-describedby="emailHelp"> 
              </div>
        
              <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label">Username</label>
                  <input type="text" class="form-control"  name="username" id="exampleInputEmail1" aria-describedby="emailHelp">
                  <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                </div> 
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label">Password</label>
                  <input type="password" class="form-control"  name="password" id="exampleInputPassword1">
                </div>
                  
                <p>Already have'n a account please<a href="/login/" >Login</a></p> 
                <button type="submit" class="btn btn-primary">Submit</button>

            </form>

</body>
</html>
