<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <title>Update Receipes</title>
</head>
<body>

    <div  class="container mt-5">   
        
        <form class="col-7 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data"> 
          {% csrf_token %}
            <h2>Update Receipe</h2>
            <hr>  
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Receipe name</label>
              <input name="receipe"  required type="text"  value="{{receipe.receipe}}" class="form-control">
            </div> 
            <div class="mb-3"> 
              <label for="exampleInputPassword1" class="form-label">Receipe description</label>
               <textarea class="form-control"  name="receipe_description" required>{{receipe.receipe_destription}}</textarea>
            </div>
            <div class="mb-3">
                <label class="exampleInputPassword1" class="form-label">Receipe Image</label>
                <input name="receipe_image"  type="file" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">Update Receipe</button> 
          </form>
    </div>
</body>
</html>
